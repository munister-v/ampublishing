name: Translate content (DeepL)

on:
  push:
    branches:
      - main
    paths:
      - 'public/content/books.ru.json'
      - 'public/content/news.ru.json'
      - 'public/content/translation-overrides.ru.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: translate-content
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run translator
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: node scripts/translate-content.mjs

      - name: Commit translations
        run: |
          git config user.name "ampublishing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/content/books.en.json public/content/books.de.json \
                  public/content/news.en.json public/content/news.de.json \
                  public/content/translation-overrides.en.json public/content/translation-overrides.de.json
          if git diff --staged --quiet; then
            echo "No translation changes."
          else
            git commit -m "ci(translate): sync EN/DE from RU via DeepL"
            git push
          fi
