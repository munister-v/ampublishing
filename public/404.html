<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AM Publishing Redirect</title>
    <script>
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        var normalized = path.replace(/\/404\.html$/, '/');
        sessionStorage.redirect = normalized;
        window.location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
